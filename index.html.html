<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>for you ♡</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --cream: #fdf6ee;
    --warm-white: #fff9f4;
    --blush: #f2c4c4;
    --dusty-rose: #c97a8a;
    --mauve: #9b6b7a;
    --sage: #8a9e87;
    --sage-light: #c4d4c0;
    --gold: #c8a96e;
    --gold-light: #e8d5a8;
    --text-dark: #3a2a2e;
    --text-mid: #6b4a52;
    --text-light: #9e7a82;
  }
  body { background: var(--cream); font-family: 'Cormorant Garamond', serif; color: var(--text-dark); overflow-x: hidden; }

  /* INTRO */
  #intro { position: fixed; inset: 0; z-index: 100; background: var(--cream); display: flex; flex-direction: column; align-items: center; justify-content: center; }
  #intro.fade-out { animation: fadeOutIntro 1.2s ease forwards; }
  @keyframes fadeOutIntro { 0%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(1.04);pointer-events:none} }
  .intro-petals { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .petal { position: absolute; opacity: 0; animation: petalFall linear infinite; }
  @keyframes petalFall { 0%{opacity:0;transform:translateY(-20px) rotate(0deg)} 10%{opacity:0.7} 90%{opacity:0.5} 100%{opacity:0;transform:translateY(100vh) rotate(360deg)} }
  .intro-content { text-align: center; position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 2rem; }
  .intro-flower-ring { position: relative; width: 200px; height: 200px; margin: 0 auto; }
  .intro-flower-ring svg { width: 100%; height: 100%; animation: slowSpin 30s linear infinite; }
  @keyframes slowSpin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .intro-title { font-family: 'IM Fell English', serif; font-style: italic; font-size: clamp(2.4rem, 6vw, 4rem); color: var(--mauve); letter-spacing: 0.02em; line-height: 1.1; animation: fadeInUp 1.2s 0.4s ease both; }
  .intro-sub { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.15rem; color: var(--text-light); letter-spacing: 0.1em; animation: fadeInUp 1.2s 0.8s ease both; }
  .intro-btn { margin-top: 0.5rem; background: none; border: 1px solid var(--dusty-rose); color: var(--mauve); font-family: 'Cormorant Garamond', serif; font-size: 1rem; letter-spacing: 0.15em; padding: 0.75rem 2.5rem; cursor: pointer; transition: all 0.4s ease; animation: fadeInUp 1.2s 1.2s ease both; position: relative; overflow: hidden; }
  .intro-btn::before { content: ''; position: absolute; inset: 0; background: var(--blush); opacity: 0; transition: opacity 0.3s ease; }
  .intro-btn:hover::before { opacity: 0.3; }
  .intro-btn:hover { border-color: var(--mauve); transform: translateY(-1px); }
  .intro-btn span { position: relative; z-index: 1; }
  @keyframes fadeInUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  /* GARDEN */
  #garden { min-height: 100vh; opacity: 0; transition: opacity 1.2s ease; padding: 0 0 6rem; }
  #garden.visible { opacity: 1; }
  .garden-header { text-align: center; padding: 4rem 2rem 3rem; position: relative; }
  .garden-header::after { content: ''; display: block; width: 80px; height: 1px; background: var(--gold); margin: 1.5rem auto 0; }
  .garden-title { font-family: 'IM Fell English', serif; font-style: italic; font-size: clamp(2rem, 5vw, 3.2rem); color: var(--mauve); letter-spacing: 0.02em; margin-bottom: 0.6rem; }
  .garden-subtitle { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.05rem; color: var(--text-light); letter-spacing: 0.08em; }

  /* FLOWER GRID */
  .flower-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1.5rem 1rem; max-width: 1050px; margin: 0 auto; padding: 1rem 2rem; }
  @media (max-width: 900px) { .flower-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 500px) { .flower-grid { grid-template-columns: repeat(2, 1fr); } }

  .flower-card { display: flex; flex-direction: column; align-items: center; gap: 0.75rem; cursor: pointer; padding: 1.4rem 0.8rem 1.2rem; border-radius: 2px; transition: transform 0.35s ease, background 0.3s ease; position: relative; background: transparent; border: none; text-align: center; }
  .flower-card::before { content: ''; position: absolute; inset: 0; border: 1px solid transparent; border-radius: 2px; transition: border-color 0.3s ease; }
  .flower-card:hover { transform: translateY(-7px); background: rgba(255,249,244,0.85); }
  .flower-card:hover::before { border-color: var(--gold-light); }

  .flower-img { width: 120px; height: 120px; object-fit: contain; filter: drop-shadow(0 2px 8px rgba(155,107,122,0.18)); transition: transform 0.35s cubic-bezier(0.23,1,0.32,1), filter 0.3s ease; display: block; border-radius: 4px; }
  .flower-card:hover .flower-img { transform: scale(1.12) rotate(-3deg); filter: drop-shadow(0 6px 20px rgba(155,107,122,0.3)); }
  .flower-name { font-family: 'Playfair Display', serif; font-size: 0.75rem; font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase; color: var(--mauve); }
  .flower-mood { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.85rem; color: var(--text-light); line-height: 1.3; }

  /* LETTER */
  #letter-overlay { position: fixed; inset: 0; z-index: 200; display: flex; align-items: center; justify-content: center; padding: 1.5rem; opacity: 0; pointer-events: none; transition: opacity 0.5s ease; }
  #letter-overlay.open { opacity: 1; pointer-events: all; }
  .letter-backdrop { position: absolute; inset: 0; background: rgba(58,42,46,0.45); backdrop-filter: blur(8px); cursor: pointer; }
  .letter-paper { position: relative; z-index: 1; background: var(--warm-white); max-width: 560px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 3.5rem 3.5rem 3rem; border-radius: 1px; box-shadow: 0 20px 80px rgba(58,42,46,0.25), 0 4px 20px rgba(58,42,46,0.1); transform: translateY(30px) scale(0.96); transition: transform 0.5s cubic-bezier(0.23,1,0.32,1); scrollbar-width: thin; scrollbar-color: var(--blush) transparent; }
  #letter-overlay.open .letter-paper { transform: translateY(0) scale(1); }
  .letter-paper::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(transparent, transparent 27px, rgba(200,169,110,0.07) 27px, rgba(200,169,110,0.07) 28px); border-radius: 1px; pointer-events: none; }
  .letter-flower { width: 100px; height: 100px; object-fit: contain; display: block; margin: 0 auto 1.2rem; filter: drop-shadow(0 2px 8px rgba(155,107,122,0.15)); }
  .letter-divider { width: 40px; height: 1px; background: var(--gold); margin: 0 auto 1.5rem; }
  .letter-label { font-family: 'Playfair Display', serif; font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-light); text-align: center; display: block; margin-bottom: 0.4rem; }
  .letter-title { font-family: 'IM Fell English', serif; font-style: italic; font-size: 1.9rem; color: var(--mauve); text-align: center; margin-bottom: 2rem; line-height: 1.2; }
  .letter-body { font-family: 'Cormorant Garamond', serif; font-size: 1.08rem; line-height: 1.9; color: var(--text-dark); font-weight: 300; position: relative; z-index: 1; }
  .letter-body p { margin-bottom: 1.2em; }
  .letter-body p:last-child { margin-bottom: 0; }
  .letter-footer { margin-top: 2rem; text-align: right; font-family: 'IM Fell English', serif; font-style: italic; font-size: 1rem; color: var(--text-light); position: relative; z-index: 1; }
  .close-btn { position: absolute; top: 1.2rem; right: 1.4rem; background: none; border: none; font-size: 1.4rem; color: var(--text-light); cursor: pointer; line-height: 1; padding: 0.2rem; transition: color 0.2s; z-index: 2; }
  .close-btn:hover { color: var(--mauve); }
  .watermark-line { position: absolute; inset: 0; background: repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(200,169,110,0.04) 40px, rgba(200,169,110,0.04) 41px); pointer-events: none; z-index: 0; }
</style>
</head>
<body>
<div class="intro-petals" id="petals"></div>

<div id="intro">
  <div class="intro-content">
    <div class="intro-flower-ring">
      <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g opacity="0.6">
          <circle cx="100" cy="12" r="5" fill="#f2c4c4"/><circle cx="100" cy="8" r="3" fill="#c97a8a"/>
          <circle cx="134" cy="22" r="5" fill="#f2c4c4"/><circle cx="134" cy="18" r="3" fill="#c97a8a"/>
          <circle cx="160" cy="47" r="5" fill="#f2c4c4"/><circle cx="160" cy="43" r="3" fill="#c97a8a"/>
          <circle cx="170" cy="80" r="5" fill="#e8d5a8"/><circle cx="170" cy="76" r="3" fill="#c8a96e"/>
          <circle cx="160" cy="113" r="5" fill="#c4d4c0"/><circle cx="160" cy="109" r="3" fill="#8a9e87"/>
          <circle cx="134" cy="138" r="5" fill="#f2c4c4"/><circle cx="134" cy="134" r="3" fill="#c97a8a"/>
          <circle cx="100" cy="148" r="5" fill="#f2c4c4"/><circle cx="100" cy="144" r="3" fill="#c97a8a"/>
          <circle cx="66" cy="138" r="5" fill="#e8d5a8"/><circle cx="66" cy="134" r="3" fill="#c8a96e"/>
          <circle cx="40" cy="113" r="5" fill="#f2c4c4"/><circle cx="40" cy="109" r="3" fill="#c97a8a"/>
          <circle cx="30" cy="80" r="5" fill="#c4d4c0"/><circle cx="30" cy="76" r="3" fill="#8a9e87"/>
          <circle cx="40" cy="47" r="5" fill="#f2c4c4"/><circle cx="40" cy="43" r="3" fill="#c97a8a"/>
          <circle cx="66" cy="22" r="5" fill="#e8d5a8"/><circle cx="66" cy="18" r="3" fill="#c8a96e"/>
        </g>
        <ellipse cx="100" cy="100" rx="55" ry="55" stroke="#c4d4c0" stroke-width="0.5" fill="none" stroke-dasharray="4 3"/>
        <circle cx="100" cy="100" r="22" fill="#fdf6ee" stroke="#f2c4c4" stroke-width="1"/>
        <text x="100" y="107" text-anchor="middle" font-family="IM Fell English, serif" font-style="italic" font-size="11" fill="#c97a8a">for you</text>
      </svg>
    </div>
    <div>
      <p class="intro-title">a little garden<br>made with love</p>
      <p class="intro-sub" style="margin-top:0.8rem;">each flower holds a letter, just for you</p>
    </div>
    <button class="intro-btn" onclick="enterGarden()"><span>open the garden ♡</span></button>
  </div>
</div>

<div id="garden">
  <div class="garden-header">
    <p class="garden-title">my garden for you</p>
    <p class="garden-subtitle">pick a flower — each one has something to say</p>
  </div>
  <div class="flower-grid" id="flowerGrid"></div>
</div>

<div id="letter-overlay">
  <div class="letter-backdrop" onclick="closeLetter()"></div>
  <div class="letter-paper">
    <button class="close-btn" onclick="closeLetter()">✕</button>
    <div class="watermark-line"></div>
    <img class="letter-flower" id="letterFlowerImg" src="" alt="" />
    <div class="letter-divider"></div>
    <span class="letter-label" id="letterLabel"></span>
    <h2 class="letter-title" id="letterTitle"></h2>
    <div class="letter-body" id="letterBody"></div>
    <div class="letter-footer">with all my love ♡</div>
  </div>
</div>

const flowers = [
  { name: "Cherry Blossom", mood: "when you're sad", label: "read this", title: "when you're sad", letter: `<p>I wish I could be right there with you, wrapping my arms around you and making everything quiet for a moment.</p><p>Sadness has a way of making the world feel very small and very heavy at the same time. But I need you to know — your feelings are real, they're valid, and you're allowed to feel them fully.</p><p>You don't have to be okay. Not right now. Not for me. I love you in every version of yourself, even the ones that cry for reasons you can't explain yet.</p><p>When you're ready, I'll be here. And even when you're not ready, I'll still be here.</p><p>The sun is already behind the clouds — it didn't leave, it's just resting. So are you.</p>` },
  { name: "Sunflower", mood: "when you miss me", label: "read this", title: "when you miss me", letter: `<p>I miss you too. Probably more than you know. Probably right at this exact moment.</p><p>Missing someone is such a tender thing. It means what we have is real enough to leave a space when it's not there. How lucky are we, to have something worth missing?</p><p>Close your eyes. Remember the last time I made you laugh. Remember how it felt. That's real — that's ours — and no amount of distance can reach in and take it.</p><p>I carry you with me everywhere I go. You're in my warmest thoughts, in the silly things that remind me of you, in every moment I wish you were beside me.</p><p>Soon. Always soon, and then together.</p>` },
  { name: "Rose", mood: "when you need love", label: "read this", title: "when you need to feel loved", letter: `<p>Let me be very clear about something: you are so deeply, completely loved.</p><p>Not because of what you do or how you look or how put-together you are. You are loved because of who you are — the specific, beautiful, irreplaceable person that only you are.</p><p>I love the way your mind works. I love how much you care. I love the little things you don't even notice about yourself that make you, you.</p><p>On the days it's hard to feel it, I hope this reminds you — someone out there thinks of you and smiles. Someone out there is so glad you exist. That someone is me.</p><p>You are loved. Fully. Without condition. Always.</p>` },
  { name: "Lotus", mood: "when you're overwhelmed", label: "read this", title: "when everything is too much", letter: `<p>Stop. Breathe. You don't have to figure everything out right now.</p><p>I know when it all piles up it feels impossible — like you're holding up the ceiling with your bare hands and if you move even slightly, everything will fall.</p><p>But you've survived every hard day so far. Every single one. That's not nothing. That's everything.</p><p>Do one small thing. Just one. Then rest. Then one more. You don't have to climb the whole mountain today — today you just have to take a step.</p><p>And I'm so proud of you. For carrying what you carry. For still showing up. For being so strong even when you don't feel like it.</p>` },
  { name: "Tulip", mood: "when you doubt yourself", label: "read this", title: "when you forget how amazing you are", letter: `<p>I need to tell you something, and I need you to really hear it.</p><p>You are so much more capable than you give yourself credit for. The doubt in your head — it's lying to you. It always has been.</p><p>I've watched you do hard things. I've seen you figure it out when you were sure you couldn't. I've seen you grow in ways you haven't even noticed yet.</p><p>You are smart. You are resilient. You are someone who deserves every good thing coming to you — not someday, but now, as you are.</p><p>The version of you that you're afraid you aren't? She's already here. I see her every day.</p>` },
  { name: "White Peony", mood: "on a hard morning", label: "read this", title: "on the mornings that feel hard", letter: `<p>Good morning, love. I know not every morning feels good. Some days, getting out of bed feels like the hardest thing in the world.</p><p>You don't have to pretend today is going to be perfect. It might be difficult. It might be slow. And that's okay.</p><p>But here's what I want you to do — just for today, be a little gentle with yourself. Drink water. Eat something warm. Let yourself move slowly if you need to.</p><p>The day doesn't need you to conquer it. It just needs you to show up, however you can.</p><p>And when tonight comes, I hope you look back and think: I made it. Because you always do.</p>` },
  { name: "Bouquet", mood: "when you need a hug", label: "read this", title: "when you really need a hug", letter: `<p>If I could reach through this and hold you right now, I would. Without hesitation. I'd hold you for as long as you needed.</p><p>Since I can't — let this letter be my arms around you. Warm. Steady. Not going anywhere.</p><p>You are allowed to need comfort. You are allowed to want to be held. That's not weakness; it's being beautifully human.</p><p>I hope this finds you and makes your chest feel a little lighter. I hope it reaches you the way I'd reach for you if I were there.</p><p>I love you. I love you. I love you. Three times, because once wasn't enough.</p>` },
  { name: "Hibiscus", mood: "when you're angry", label: "read this", title: "when you're frustrated or angry", letter: `<p>Your anger is valid. Feel it. You don't have to shrink it or apologize for it.</p><p>Something upset you, and that matters. You matter. Your feelings about what happened matter.</p><p>But when it passes — and it will pass — I hope you'll find a little peace on the other side. Not because the thing that happened is suddenly okay, but because you deserve peace more than you deserve to carry this.</p><p>You're allowed to be angry. You're also allowed to put it down when you're ready.</p><p>Either way, I'm with you. I'm on your side. Always.</p>` },
  { name: "Lily", mood: "when you're anxious", label: "read this", title: "when anxiety finds you", letter: `<p>Notice five things you can see right now. Four things you can touch. Three things you can hear.</p><p>You are here. You are present. The thing you're afraid of — it's not happening right now, in this moment. Right now, you're okay.</p><p>Anxiety lies. It takes maybe and turns it into definitely. It takes later and moves it to right now. But you know this. And knowing it is already half the battle.</p><p>Take a breath. Let it out slowly. You've felt this before and you've always come out on the other side.</p><p>I believe in your ability to get through this. More than you know. More than you'd believe right now. But I believe it for both of us, and I'll hold it until you can hold it yourself.</p>` },
  { name: "White Blossom", mood: "when you can't sleep", label: "read this", title: "on the nights sleep won't come", letter: `<p>Shh. The world is quieter now. It's just you and the dark, and maybe a thousand thoughts that won't stop moving.</p><p>You don't have to fight them. Let them pass like clouds — look at them, let them drift, don't grab on.</p><p>Somewhere out there, right now, someone who loves you is breathing slowly in their sleep. The same air. The same night. Not so far after all.</p><p>You don't have to solve anything tonight. The problems will still be there tomorrow, but so will the light — and things always look different in the light.</p><p>Rest, love. Let your body be heavy. Let go of the day. Tomorrow is coming, and it will be gentler. I promise.</p>` }
];

    const p = document.createElement('img');
    p.src = petalImgs[i % petalImgs.length];
    p.style.cssText = `position:absolute;width:${28+Math.random()*22}px;height:${28+Math.random()*22}px;object-fit:contain;left:${Math.random()*100}vw;top:-40px;opacity:0;animation:petalFall ${7+Math.random()*9}s ${Math.random()*8}s linear infinite;filter:drop-shadow(0 2px 4px rgba(155,107,122,0.2));`;
    container.appendChild(p);
  }
}

function buildGrid() {
  const grid = document.getElementById('flowerGrid');
  flowers.forEach((f, i) => {
    const card = document.createElement('button');
    card.className = 'flower-card';
    card.innerHTML = `<img class="flower-img" src="${flowerImages[i]}" alt="${f.name}" /><span class="flower-name">${f.name}</span><span class="flower-mood">${f.mood}</span>`;
    card.onclick = () => openLetter(i);
    grid.appendChild(card);
  });
}

function enterGarden() {
  const intro = document.getElementById('intro');
  const garden = document.getElementById('garden');
  intro.classList.add('fade-out');
  setTimeout(() => { intro.style.display = 'none'; garden.classList.add('visible'); }, 1200);
}

function openLetter(index) {
  const f = flowers[index];
  document.getElementById('letterFlowerImg').src = flowerImages[index];
  document.getElementById('letterFlowerImg').alt = f.name;
  document.getElementById('letterLabel').textContent = f.label;
  document.getElementById('letterTitle').textContent = f.title;
  document.getElementById('letterBody').innerHTML = f.letter;
  document.getElementById('letter-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLetter() {
  document.getElementById('letter-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLetter(); });
createPetals();
buildGrid();
</script>
</body>
</html>
